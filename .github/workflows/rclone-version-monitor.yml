name: Rclone Version Monitor

on:
  schedule:
    # Check for new rclone releases daily at 6:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allow manual triggering

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  check-rclone-version:
    runs-on: ubuntu-latest
    outputs:
      new-version-available: ${{ steps.version-check.outputs.new-version-available }}
      latest-version: ${{ steps.version-check.outputs.latest-version }}
      current-version: ${{ steps.version-check.outputs.current-version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get latest rclone version from GitHub API
        id: get-latest-version
        run: |
          set -eo pipefail
          # Keep the release metadata in one response so the version and timestamp cannot drift between API calls.
          API_RESPONSE=$(curl -fsSL "https://api.github.com/repos/rclone/rclone/releases/latest")
          # The tag is still the install target, while published_at is the evidence used for the safety delay.
          LATEST_VERSION=$(echo "${API_RESPONSE}" | jq -r '.tag_name')
          RELEASE_PUBLISHED_AT=$(echo "${API_RESPONSE}" | jq -r '.published_at')

          if [ -z "${LATEST_VERSION}" ] || [ "${LATEST_VERSION}" = "null" ]; then
            echo "::error::Failed to get latest rclone version. API response might be empty or malformed."
            echo "Raw API Response: ${API_RESPONSE}" >&2
            exit 1
          fi

          if [ -z "${RELEASE_PUBLISHED_AT}" ] || [ "${RELEASE_PUBLISHED_AT}" = "null" ]; then
            echo "::error::Failed to get rclone release publish timestamp. API response might be missing published_at."
            echo "Raw API Response: ${API_RESPONSE}" >&2
            exit 1
          fi

          # Write related outputs together so the step exposes a consistent release snapshot to later checks.
          {
            echo "latest-version=${LATEST_VERSION}"
            echo "release-published-at=${RELEASE_PUBLISHED_AT}"
          } >> "$GITHUB_OUTPUT"
          echo "Latest rclone version: ${LATEST_VERSION}"
          echo "Latest rclone release published at: ${RELEASE_PUBLISHED_AT}"

      - name: Get current rclone version from Docker Hub image
        id: get-current-version
        run: |
          # Pull the latest image from Docker Hub
          docker pull nikhilbadyal/bitwarden-backup:latest

          # Run the image and extract rclone version (override entrypoint to avoid backup script)
          CURRENT_VERSION=$(docker run --rm --entrypoint="" nikhilbadyal/bitwarden-backup:latest rclone version | head -n1 | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')
          echo "current-version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Current rclone version in Docker Hub image: ${CURRENT_VERSION}"

      - name: Compare versions and set flag
        id: version-check
        run: |
          # Four full days gives the ecosystem time to identify a bad upstream release before this image consumes it.
          readonly MIN_RELEASE_AGE_SECONDS=$((4 * 24 * 60 * 60))
          # A named day length keeps the age reporting tied to the same unit as the safety policy.
          readonly SECONDS_PER_DAY=$((24 * 60 * 60))

          # The latest/current pair preserves the existing bump decision while the publish timestamp adds the quarantine gate.
          LATEST="${{ steps.get-latest-version.outputs.latest-version }}"
          CURRENT="${{ steps.get-current-version.outputs.current-version }}"
          RELEASE_PUBLISHED_AT="${{ steps.get-latest-version.outputs.release-published-at }}"

          # Parse the upstream timestamp with GNU date from ubuntu-latest so the gate uses UTC epoch math, not string ordering.
          if ! RELEASE_PUBLISHED_SECONDS=$(date -u -d "${RELEASE_PUBLISHED_AT}" +%s); then
            echo "::error::Unable to parse rclone release timestamp: ${RELEASE_PUBLISHED_AT}"
            exit 1
          fi

          # Calculate release age at workflow runtime so scheduled reruns naturally unlock once the wait window passes.
          NOW_SECONDS=$(date -u +%s)
          RELEASE_AGE_SECONDS=$((NOW_SECONDS - RELEASE_PUBLISHED_SECONDS))
          RELEASE_AGE_DAYS=$((RELEASE_AGE_SECONDS / SECONDS_PER_DAY))

          # Write the shared outputs once before branching so issue creation receives the same data as the gate.
          {
            echo "latest-version=${LATEST}"
            echo "current-version=${CURRENT}"
            echo "release-published-at=${RELEASE_PUBLISHED_AT}"
            echo "release-age-days=${RELEASE_AGE_DAYS}"
          } >> "$GITHUB_OUTPUT"

          if [ "${LATEST}" != "${CURRENT}" ]; then
            if [ "${RELEASE_AGE_SECONDS}" -le "${MIN_RELEASE_AGE_SECONDS}" ]; then
              # Treat the exact four-day boundary as still waiting so the workflow only bumps after the release is older than four days.
              echo "new-version-available=false" >> "$GITHUB_OUTPUT"
              echo "rclone ${LATEST} is newer than ${CURRENT}, but it was published ${RELEASE_AGE_DAYS} full days ago at ${RELEASE_PUBLISHED_AT}. Waiting until it is more than 4 days old before rebuilding."
            else
              echo "new-version-available=true" >> "$GITHUB_OUTPUT"
              echo "🚀 New rclone version available: ${LATEST} (current: ${CURRENT}); release age is ${RELEASE_AGE_DAYS} full days."
            fi
          else
            echo "new-version-available=false" >> "$GITHUB_OUTPUT"
            echo "✅ Rclone is up to date: ${CURRENT}"
          fi

      - name: Create issue for new version
        if: steps.version-check.outputs.new-version-available == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const latestVersion = '${{ steps.version-check.outputs.latest-version }}';
            const currentVersion = '${{ steps.version-check.outputs.current-version }}';
            // Include the age evidence so maintainers can confirm the supply-chain delay passed before the rebuild.
            const releasePublishedAt = '${{ steps.version-check.outputs.release-published-at }}';
            const releaseAgeDays = '${{ steps.version-check.outputs.release-age-days }}';

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'rclone-update'
            });

            const existingIssue = issues.data.find(issue =>
              issue.title.includes(latestVersion)
            );

            if (!existingIssue) {
              const issueBody = [
                'A new version of rclone is available and Docker images will be updated automatically.',
                '',
                '**Version Information:**',
                `- **Current version:** ${currentVersion}`,
                `- **Latest version:** ${latestVersion}`,
                `- **Published at:** ${releasePublishedAt}`,
                `- **Release age:** ${releaseAgeDays} full days`,
                `- **Release URL:** https://github.com/rclone/rclone/releases/tag/${latestVersion}`,
                '',
                '**Automated Actions:**',
                '- ✅ Docker image will be rebuilt and pushed to Docker Hub',
                '- ✅ Main backup service image will be updated',
                '- 🔄 This process was triggered automatically by the rclone version monitor',
                '',
                'This issue will be automatically closed once the Docker image is successfully updated.'
              ].join('\n');

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔄 New rclone version available: ${latestVersion}`,
                body: issueBody,
                labels: ['rclone-update', 'automation', 'docker']
              });

              console.log(`Created issue for rclone version ${latestVersion}`);
            }

  trigger-docker-build:
    needs: check-rclone-version
    if: needs.check-rclone-version.outputs.new-version-available == 'true'
    uses: ./.github/workflows/dockerhub-push.yml
    with:
      dockerfile: Dockerfile
      push-description: true
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  update-issue-success:
    needs: [check-rclone-version, trigger-docker-build]
    if: always() && needs.check-rclone-version.outputs.new-version-available == 'true' && needs.trigger-docker-build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Close rclone update issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const latestVersion = '${{ needs.check-rclone-version.outputs.latest-version }}';

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'rclone-update'
            });

            const targetIssue = issues.data.find(issue =>
              issue.title.includes(latestVersion)
            );

            if (targetIssue) {
              const commentBody = [
                '✅ **Docker image successfully updated!**',
                '',
                '**Completed Actions:**',
                '- 🐳 Main backup image rebuilt and pushed to Docker Hub',
                `- 📦 Image now includes rclone ${latestVersion}`,
                '- 🌍 Multi-architecture support maintained (linux/amd64, linux/arm64)',
                '',
                '**Docker Hub Image:**',
                `- \`${context.repo.owner}/${context.repo.repo}:latest\``,
                '',
                'The Docker image is now up to date with the latest rclone version. Closing this issue.'
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: targetIssue.number,
                body: commentBody
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: targetIssue.number,
                state: 'closed'
              });

              console.log(`Closed issue #${targetIssue.number} for rclone version ${latestVersion}`);
            }

  update-issue-failure:
    needs: [check-rclone-version, trigger-docker-build]
    if: always() && needs.check-rclone-version.outputs.new-version-available == 'true' && needs.trigger-docker-build.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Comment on failure
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const latestVersion = '${{ needs.check-rclone-version.outputs.latest-version }}';

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'rclone-update'
            });

            const targetIssue = issues.data.find(issue =>
              issue.title.includes(latestVersion)
            );

            if (targetIssue) {
              const failureBody = [
                '❌ **Docker image update failed!**',
                '',
                `There was an error updating the Docker image with rclone ${latestVersion}.`,
                '',
                '**Action Required:**',
                `- Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details`,
                '- Manual intervention may be required',
                '- Consider updating the Dockerfile manually if needed',
                '',
                'This issue will remain open until the Docker image is successfully updated.'
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: targetIssue.number,
                body: failureBody
              });

              console.log(`Added failure comment to issue #${targetIssue.number}`);
            }
